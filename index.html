<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Business Card</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    padding:20px;
}

.card{
    width:350px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.banner{
    height:120px;
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
}

.avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    border:5px solid white;
    margin-top:-55px;
    object-fit:cover;
}

.content{
    padding:20px;
}

h2{
    color:#222;
    margin-bottom:5px;
}

.role{
    color:#6366f1;
    font-weight:600;
    margin-bottom:15px;
}

.bio{
    color:#666;
    line-height:1.6;
    margin-bottom:20px;
}

.stats{
    display:flex;
    justify-content:space-around;
    margin-bottom:20px;
}

.stats div{
    text-align:center;
}

.stats strong{
    display:block;
    font-size:1.2rem;
    color:#222;
}

.stats span{
    color:#777;
    font-size:0.9rem;
}


button{
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
}

.primary{
    background:#6366f1;
    color:white;
}

button:hover{
    opacity:0.9;
}

.footer{
    padding:15px;
    background:#f8fafc;
    color:#777;
    font-size:0.85rem;
}
</style>
</head>
<body>

<div class="card">
    <div class="banner"></div>

    <img
        class="avatar"
        src="https://avatars.githubusercontent.com/u/291547002?v=4"
        alt="Profile"
    >

    <div class="content">
        <h2>K.</h2>
        <p class="role">Web Developer</p>

        <p class="bio">
            Building clean, responsive web experiences and
            turning ideas into modern digital products.
        </p>

        <div class="stats">
            <div>
                <strong>24</strong>
                <span>Projects</span>
            </div>

            <div>
                <strong>5+</strong>
                <span>Years</span>
            </div>

            <div>
                <strong>18</strong>
                <span>Clients</span>
            </div>
        </div>

        <button class="primary" onclick="contactMe()">
            Contact
        </button>
    </div>

    <div class="footer">
        Available for freelance work
    </div>
</div>

<script>
function contactMe(){
    alert("Email: ks@example.com");
}
</script>

</body>
</html>
